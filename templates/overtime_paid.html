<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Overtime Paid — Helmlock 4S</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Barlow:wght@400;600&display=swap" rel="stylesheet"/>
<style>
  :root{--bg:#08090b;--panel:#161a23;--accent:#f5c400;--green:#00e07a;--text:#eef0f6;--muted:#5a6478;--border:#1f2433;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px;}
  .card{background:var(--panel);border:1.5px solid rgba(0,224,122,0.3);border-radius:20px;padding:48px 56px;text-align:center;max-width:420px;display:flex;flex-direction:column;gap:16px;align-items:center;}
  .icon{font-size:4rem;}
  .title{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;color:var(--green);letter-spacing:0.06em;}
  .sub{color:var(--muted);font-size:0.9rem;line-height:1.6;}
  .badge{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;background:var(--accent);color:#0a0b0d;padding:8px 24px;border-radius:8px;letter-spacing:0.1em;}
  .note{font-size:0.8rem;color:var(--muted);}
  .btn{display:inline-flex;align-items:center;justify-content:center;padding:0 32px;height:52px;border-radius:12px;border:none;font-family:'Barlow',sans-serif;font-size:0.95rem;font-weight:700;cursor:pointer;background:var(--accent);color:#0a0b0d;text-decoration:none;width:100%;margin-top:8px;}
  .btn:hover{background:#ffd220;}
</style>
</head>
<body>
<div class="card">
  <div class="icon">🔓</div>
  <div class="title">Overtime Paid!</div>
  <div class="sub">Your additional charge has been processed. Return to the kiosk and enter your PIN to retrieve your helmet.</div>
  <div class="badge">LOCKER #{{ locker }}</div>
  <div class="note">PIN: {{ pin }}</div>
  <a href="/" class="btn">🏠 Back to Kiosk</a>
</div>
</body>
</html>
