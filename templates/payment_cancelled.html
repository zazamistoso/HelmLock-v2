<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Payment Cancelled — Helmlock 4S</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@400;600&display=swap" rel="stylesheet"/>
<style>
  :root{--bg:#0a0b0d;--panel:#181c24;--red:#ff4757;--text:#e8eaf0;--muted:#6b7280;--accent:#f5c400;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px;}
  .card{background:var(--panel);border:1.5px solid rgba(255,71,87,0.3);border-radius:20px;padding:48px 56px;text-align:center;max-width:420px;}
  .icon{font-size:3.5rem;margin-bottom:16px;}
  .title{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;color:var(--red);margin-bottom:10px;letter-spacing:0.06em;}
  .sub{color:var(--muted);font-size:0.9rem;margin-bottom:32px;}
  .btn{display:inline-flex;padding:14px 32px;border-radius:10px;border:none;font-family:'Outfit',sans-serif;font-size:0.95rem;font-weight:600;cursor:pointer;background:var(--accent);color:#0a0b0d;text-decoration:none;}
</style>
</head>
<body>
<div class="card">
  <div class="icon">❌</div>
  <div class="title">Payment Cancelled</div>
  <div class="sub">Your transaction was not completed. No charges were made.</div>
  <a href="/" class="btn">← Back to Kiosk</a>
</div>
</body>
</html>
