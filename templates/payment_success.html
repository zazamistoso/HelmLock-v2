<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Payment Successful — Helmlock 4S</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Barlow:wght@400;600&display=swap" rel="stylesheet"/>
<style>
  :root{--bg:#08090b;--panel:#161a23;--accent:#f5c400;--green:#00e07a;--text:#eef0f6;--muted:#5a6478;--border:#1f2433;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px;}
  .card{background:var(--panel);border:1.5px solid var(--border);border-radius:20px;padding:36px 40px;max-width:440px;width:100%;display:flex;flex-direction:column;gap:18px;}
  .card-header{display:flex;align-items:center;justify-content:space-between;}
  .logo{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:0.1em;color:var(--accent);}
  .paid-tag{background:rgba(0,224,122,0.12);border:1px solid rgba(0,224,122,0.3);color:var(--green);font-size:0.7rem;font-weight:700;letter-spacing:0.08em;padding:4px 12px;border-radius:20px;}
  .divider{height:1px;background:var(--border);}
  .divider.dashed{background:none;border-top:1.5px dashed var(--border);}
  .rows{display:flex;flex-direction:column;gap:12px;}
  .row{display:flex;align-items:center;justify-content:space-between;font-size:0.88rem;}
  .lbl{color:var(--muted);}
  .val{font-family:'DM Mono',monospace;font-weight:500;font-size:0.82rem;}
  .val.accent{color:var(--accent);font-size:1rem;font-weight:600;}
  .pin-section{text-align:center;}
  .pin-label{font-size:0.65rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;}
  .pin-row{display:flex;gap:10px;justify-content:center;}
  .pin-digit{width:54px;height:68px;background:var(--bg);border:2px solid var(--accent);border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:2.2rem;color:var(--accent);box-shadow:0 0 14px rgba(245,196,0,0.2);}
  .note{font-size:0.72rem;color:var(--muted);text-align:center;line-height:1.7;}
  .note strong{color:var(--text);}
  .btn{display:inline-flex;align-items:center;justify-content:center;padding:0 32px;height:52px;border-radius:12px;border:none;font-family:'Barlow',sans-serif;font-size:0.95rem;font-weight:700;cursor:pointer;background:var(--accent);color:#0a0b0d;text-decoration:none;width:100%;}
  .btn:hover{background:#ffd220;}
</style>
</head>
<body>
<div class="card">
  <div class="card-header">
    <div class="logo">HELMLOCK <span style="color:var(--text)">4S</span></div>
    <div class="paid-tag">✅ PAID</div>
  </div>
  <div class="divider"></div>
  <div class="rows">
    <div class="row"><span class="lbl">🔒 Locker</span><span class="val">#{{ locker }}</span></div>
    <div class="row"><span class="lbl">💳 Payment</span><span class="val">Cashless (Stripe)</span></div>
    <div class="row"><span class="lbl">🕐 Rented At</span><span class="val">{{ rented_at }}</span></div>
    <div class="row"><span class="lbl">⏱ Expires At</span><span class="val">{{ expires_at }}</span></div>
    <div class="row"><span class="lbl">💰 Amount</span><span class="val accent">₱50.00</span></div>
  </div>
  <div class="divider dashed"></div>
  <div class="pin-section">
    <div class="pin-label">Your Access PIN</div>
    <div class="pin-row">
      {% for digit in pin %}
      <div class="pin-digit">{{ digit }}</div>
      {% endfor %}
    </div>
  </div>
  <div class="divider dashed"></div>
  <div class="note">
    Enter this PIN at the kiosk to retrieve your helmet.<br/>
    <strong>Single-use · Do not share.</strong>
  </div>
  <a href="/" class="btn">🏠 Back to Kiosk</a>
</div>
</body>
</html>
